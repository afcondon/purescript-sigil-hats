workspace:
  extraPackages:
    sigil-hats:
      path: ..

package:
  name: sigil-hats-demo
  dependencies:
    - aff: ">=8.0.0 <9.0.0"
    - arrays: ">=7.3.0 <8.0.0"
    - console: ">=6.1.0 <7.0.0"
    - effect: ">=4.0.0 <5.0.0"
    - halogen: ">=7.0.0 <8.0.0"
    - hylograph-selection: ">=0.5.0 <0.6.0"
    - hylograph-simulation: ">=0.5.0 <0.6.0"
    - hylograph-simulation-halogen: ">=0.5.0 <0.6.0"
    - maybe: ">=6.0.0 <7.0.0"
    - nullable: ">=6.0.0 <7.0.0"
    - ordered-collections: ">=3.2.0 <4.0.0"
    - prelude: ">=6.0.2 <7.0.0"
    - sigil: ">=0.3.0 <0.4.0"
    - sigil-hats: "*"
  bundle:
    module: Main
    outfile: public/bundle.js
    platform: browser
